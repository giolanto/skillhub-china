<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>嵩山副本 · 即将上线</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif; background: #070b18; color: #eef3ff; display: grid; place-items: center; height: 100vh; margin: 0; }
    .box { text-align: center; padding: 40px; border: 1px solid rgba(156,182,255,.25); border-radius: 22px; background: rgba(12,20,42,.8); max-width: 480px; }
    h1 { font-size: 28px; margin-bottom: 12px; }
    p { color: #b3c0e4; font-size: 15px; line-height: 1.6; }
    .tag { display: inline-block; border: 1px solid rgba(125,180,255,.5); background: rgba(78,127,218,.2); border-radius: 999px; padding: 4px 12px; font-size: 13px; margin-bottom: 16px; }
    .loader { margin-top: 24px; width: 40px; height: 40px; border: 3px solid rgba(105,219,255,.2); border-top-color: #69dfff; border-radius: 50%; animation: spin 1s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="box">
    <span class="tag">嵩山副本 · 即将上线</span>
    <h1>🏔️ 嵩山副本</h1>
    <p>少林寺 · 嵩山步道 · 中岳庙<br />正在上传中，请稍候...</p>
    <div class="loader"></div>
  </div>
</body>
</html>
