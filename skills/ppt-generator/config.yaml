      title: "个人数字助理"
      desc: "整合所有通讯渠道"
    - icon: "📰"
      title: "AI资讯Daily"
      desc: "自动抓取+推送新闻"
    - icon: "🛒"
      title: "闲鱼监控"
      desc: "商品数据监控与分析"
    - icon: "📚"
      title: "知识管理"
      desc: "第二大脑+语义搜索"

  summary:
    - "✅ 本地运行 - 数据隐私有保障"
